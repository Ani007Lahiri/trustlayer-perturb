name: trustlayer-ci

# Runs the TrustLayer commit-gate test suite on every push and pull request.
# The user owns the repo and enables Actions; this workflow is ready to run
# as-is once committed under .github/workflows/.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

jobs:
  test:
    name: pytest (commit gate)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal, pinned-free deps the suite needs.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest numpy
          fi

      - name: Run pytest
        run: |
          python -m pytest test_trustlayer.py -v --junitxml=pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-py${{ matrix.python-version }}
          path: pytest-report.xml
          if-no-files-found: ignore
