<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Trust Atlas — a pLDDT for perturbation biology</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--go:#1f77b4;--wh:#9e9e9e;--ink:#15243b;--muted:#5b6b82;--bg:#f4f6fb;--card:#fff;--line:#e2e8f2;--accent:#2563eb;--warn:#c0392b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;background:var(--bg);color:var(--ink);padding:22px 20px 40px}
.wrap{max-width:1120px;margin:0 auto}
h1{font-size:26px;letter-spacing:-.02em;margin-bottom:2px}
.sub{color:var(--muted);font-size:15px;margin-bottom:16px}
.sub b{color:var(--ink)}
.bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:14px}
.toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.toggle button{border:0;background:#fff;padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;color:var(--muted)}
.toggle button.on{background:var(--accent);color:#fff}
.legend{display:flex;gap:14px;align-items:center;font-size:13px;margin-left:auto;flex-wrap:wrap}
.lg{display:flex;gap:6px;align-items:center}
.sw{width:14px;height:14px;border-radius:3px;display:inline-block}
.main{display:grid;grid-template-columns:1fr 320px;gap:16px}
@media(max-width:820px){.main{grid-template-columns:1fr}}
.atlas{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.atlas .ttl{font-weight:800;font-size:15px;margin-bottom:3px}
.atlas .cap{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.field{display:grid;grid-template-columns:repeat(auto-fill,minmax(30px,1fr));gap:5px}
.tile{aspect-ratio:1;border-radius:5px;cursor:pointer;position:relative;transition:transform .1s;border:1px solid rgba(0,0,0,.06)}
.tile:hover{transform:scale(1.18);z-index:5;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.tile.sel{outline:3px solid var(--accent);outline-offset:1px}
.rail{display:flex;flex-direction:column;gap:14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.panel .ph{font-weight:800;font-size:14px;margin-bottom:8px}
.metric{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;border-top:1px solid #f0f3f8}
.metric b{font-variant-numeric:tabular-nums}
.big{font-size:30px;font-weight:800;letter-spacing:-.02em}
.ar- {color:var(--muted)}
.frozen .big{color:var(--warn)}.recal .big{color:var(--go)}
.gcard .gn{font-size:20px;font-weight:800}
.verdict{display:inline-block;margin:8px 0;padding:6px 14px;border-radius:999px;font-weight:800;font-size:14px;color:#fff}
.verdict.GO{background:var(--go)}.verdict.WITHHELD{background:var(--wh)}
.chk{display:flex;gap:8px;font-size:13.5px;padding:5px 0;border-top:1px solid #f0f3f8}
.chk .ic{font-weight:800}.chk.ok .ic{color:var(--go)}.chk.no .ic{color:var(--warn)}
.eff{margin-top:10px;background:#f7f9fc;border-radius:8px;padding:9px 11px;font-size:13px;color:var(--muted)}
.eff b{color:var(--ink)}
.covrow{display:flex;gap:8px;align-items:center;font-size:13px;margin:3px 0}
.covbar{flex:1;height:12px;background:#eef2f7;border-radius:6px;overflow:hidden;position:relative}
.covfill{height:100%;border-radius:6px}
.nom{position:absolute;top:-2px;bottom:-2px;width:2px;background:#111}
.note{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:10px;background:#eef2fa;border-left:3px solid var(--accent);padding:9px 11px;border-radius:0 8px 8px 0}
.hero-msg{font-size:14px;line-height:1.5;padding:10px 12px;border-radius:8px;margin-bottom:12px}
.frozen .hero-msg{background:#fbeeee;color:#7d2a20}.recal .hero-msg{background:#e9f3f9;color:#12506e}
</style></head>
<body><div class="wrap">
<h1>The Trust Atlas</h1>
<div class="sub">A <b>pLDDT for perturbation biology</b>. Every tile is one gene's perturbation in CD4+ T cells. Colour is <b>calibrated trust</b> — not the model's self-confidence. Half the field is grey on purpose: <b>the gate abstains as often as it commits.</b></div>

<div class="bar">
  <div class="toggle"><button id="tf" class="on">① Frozen gate</button><button id="tr">② Recalibrated on 22M-cell atlas</button></div>
  <div class="legend">
    <div class="lg"><span class="sw" style="background:var(--go)"></span> GO (commit)</div>
    <div class="lg"><span class="sw" style="background:var(--wh)"></span> WITHHOLD (abstain)</div>
    <div class="lg" id="cnt" style="color:var(--muted)"></div>
  </div>
</div>

<div class="main">
  <div class="atlas" id="atlasBox">
    <div class="ttl" id="atlasTtl"></div>
    <div class="cap" id="atlasCap"></div>
    <div class="hero-msg" id="heroMsg"></div>
    <div class="field" id="field"></div>
  </div>
  <div class="rail">
    <div class="panel" id="relPanel">
      <div class="ph">External validation</div>
      <div id="relBody"></div>
    </div>
    <div class="panel gcard" id="gcard"></div>
  </div>
</div>
</div>

var mode='frozen';
var sel='RASGRP1';
var maxde=Math.max.apply(null,D.genes.map(function(g){return g.de_max||0}));

function tileColor(g){
  if(mode==='frozen'){ return g.call==='GO'?'var(--go)':'var(--wh)'; }
  // recalibrated view: colour by REAL effect magnitude (the thing the re-fit predictor learns to track)
  var t=Math.min(1,(g.de_max||0)/ (maxde*0.5));
  var r=Math.round(233-(233-31)*t), gr=Math.round(243-(243-119)*t), b=Math.round(249-(249-180)*t);
  return 'rgb('+r+','+gr+','+b+')';
}
function drawField(){
  var f=document.getElementById('field'); f.innerHTML='';
  D.genes.forEach(function(g){
    var d=document.createElement('div'); d.className='tile'+(g.gene===sel?' sel':'');
    d.style.background=tileColor(g);
    d.title=g.gene+' — '+g.call+' — real effect '+g.de_max;
    d.onclick=function(){sel=g.gene;drawField();drawCard();};
    f.appendChild(d);
  });
}
function drawHeader(){
  var box=document.getElementById('atlasBox'); box.className='atlas '+mode;
  var rel=document.getElementById('relPanel'); rel.className='panel '+mode;
  if(mode==='frozen'){
    document.getElementById('atlasTtl').textContent='Frozen gate — genetic-credibility calls';
    document.getElementById('atlasCap').textContent='Colour = the commit-gate decision. Tiles are sorted by REAL transcriptional effect (biggest first).';
    document.getElementById('heroMsg').innerHTML='Look at the top-left — the biggest real effects. Many are <b>grey (WITHHELD)</b>. The frozen gate\u2019s calls do <b>not</b> track real effect size: <b>AUROC '+D.levA.frozen_auroc.toFixed(3)+'</b> (0.5 = coin flip). That is an honest external <b>null</b>, reported not hidden.';
  } else {
    document.getElementById('atlasTtl').textContent='Re-fit on the deployment cell type (Zhu 2025, 22M cells)';
    document.getElementById('atlasCap').textContent='Colour = calibrated predicted effect after per-assay recalibration. Darker = higher, tracking real effect.';
    document.getElementById('heroMsg').innerHTML='Recalibrating on the exact deployment cell type turns the null into a real signal: <b>held-out AUROC '+D.levA.heldout_auroc.toFixed(3)+'</b> ['+D.levA.ci[0].toFixed(3)+', '+D.levA.ci[1].toFixed(3)+'], p='+D.levA.perm_p.toFixed(4)+', on '+D.levA.n_test_genes+' genes never seen in training. <b>Honest bound:</b> this is within-assay recalibration \u2014 a new assay would need its own.';
  }
  document.getElementById('cnt').textContent=D.counts.GO+' GO \u00b7 '+D.counts.WITHHELD+' WITHHOLD';
}
function covBars(obj,lab){
  var lv=['0.8','0.9','0.95'],nm={'0.8':0.8,'0.9':0.9,'0.95':0.95};
  return lv.map(function(k){var v=obj[k];var nomPct=nm[k]*100;
    return '<div class="covrow"><span style="width:34px">'+Math.round(nm[k]*100)+'%</span>'+
    '<div class="covbar"><div class="covfill" style="width:'+(v*100).toFixed(0)+'%;background:'+(Math.abs(v-nm[k])<=0.03?'var(--go)':'var(--warn)')+'"></div><div class="nom" style="left:'+nomPct+'%"></div></div>'+
    '<span style="width:44px;text-align:right">'+(v*100).toFixed(0)+'%</span></div>';}).join('');
}
function drawRel(){
  var b=document.getElementById('relBody');
  if(mode==='frozen'){
    b.innerHTML='<div class="big">'+D.levA.frozen_auroc.toFixed(3)+'</div><div style="color:var(--muted);font-size:13px;margin-bottom:8px">effect-separation AUROC (frozen)</div>'+
    '<div style="font-size:13px;font-weight:700;margin:6px 0">Frozen cross-assay coverage — breaks</div>'+covBars(D.cov.frozen)+
    '<div class="note">Frozen quantiles transferred to a new assay miss badly (target 80/90/95%). This is the concept-shift failure \u2014 disclosed, not hidden.</div>';
  } else {
    b.innerHTML='<div class="big">'+D.levA.heldout_auroc.toFixed(3)+'</div><div style="color:var(--muted);font-size:13px;margin-bottom:8px">held-out AUROC, p='+D.levA.perm_p.toFixed(4)+'</div>'+
    '<div style="font-size:13px;font-weight:700;margin:6px 0">Recalibrated coverage — holds</div>'+covBars(D.cov.recal)+
    '<div class="metric"><span>survives depth control</span><b>partial \u03c1='+D.levA.partial_spearman.toFixed(3)+'</b></div>'+
    '<div class="metric"><span>depth alone (inverted)</span><b>'+D.levA.ncells_alone.toFixed(3)+'</b></div>'+
    '<div class="note">Coverage holds across all 4 donors (\u00b13% of nominal). The signal is real effect biology, not sequencing depth (depth alone is inverted).</div>';
  }
}
function drawCard(){
  var g=D.genes.filter(function(x){return x.gene===sel})[0];
  var checks=(g.checks||[]).map(function(c){var ok=c[1];return '<div class="chk '+(ok?'ok':'no')+'"><span class="ic">'+(ok?'\u2713':'\u2717')+'</span><span>'+c[2]+'</span></div>';}).join('');
  document.getElementById('gcard').innerHTML='<div class="ph">Inspect a gene</div>'+
    '<div class="gn">'+g.gene+'</div><div class="verdict '+g.call+'">'+g.call+'</div>'+checks+
    '<div class="eff">Real effect in the 22M-cell atlas: <b>'+g.de_max+'</b> downstream genes changed'+
    (g.call==='WITHHELD'&&g.de_max>=100?' \u2014 <b>large effect, yet WITHHELD.</b> The gate judges evidence, not effect size. This mismatch is exactly why the frozen external test was a null.':'')+'</div>';
}

document.getElementById('tr').onclick=function(){mode='recal';this.classList.add('on');document.getElementById('tf').classList.remove('on');drawHeader();drawField();drawRel();};
